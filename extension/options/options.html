<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stash Options</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #eee;
      --text-secondary: #aaa;
      --accent: #e94560;
      --success: #4ade80;
      --border: #2a2a4a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 20px;
      min-width: 400px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .help-text {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #ff6b6b;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .connection-status {
      margin-top: 16px;
      padding: 10px;
      background: var(--bg-secondary);
      border-radius: 6px;
      font-size: 13px;
    }

    .connection-status .indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .connection-status.connected .indicator {
      background: var(--success);
    }

    .connection-status.disconnected .indicator {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <h1>Stash Options</h1>

  <div class="form-group">
    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3030">
    <p class="help-text">The URL of your Stash backend server</p>
  </div>

  <div class="form-group">
    <label for="apiToken">API Token (Optional)</label>
    <input type="password" id="apiToken" placeholder="Enter your API token">
    <p class="help-text">If your server requires authentication</p>
  </div>

  <div class="button-group">
    <button class="btn-primary" id="saveBtn">Save Settings</button>
    <button class="btn-secondary" id="testBtn">Test Connection</button>
  </div>

  <div id="status" class="status"></div>

  <div id="connectionStatus" class="connection-status disconnected">
    <span class="indicator"></span>
    <span class="text">Not connected</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
